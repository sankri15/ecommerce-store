<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password – GlowMart</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .forgot-card {
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            padding: 48px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .logo-area { text-align: center; margin-bottom: 32px; }
        .logo-area a { text-decoration: none; }
        .logo-area h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            background: linear-gradient(135deg, #7c3aed, #06b6d4, #f43f5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo-area p { color: rgba(255,255,255,0.6); font-size: 0.9rem; margin-top: 8px; }
        .card-title { color: white; font-family: 'Space Grotesk', sans-serif; font-size: 1.5rem; font-weight: 700; text-align: center; margin-bottom: 8px; }
        .card-subtitle { color: rgba(255,255,255,0.6); font-size: 0.9rem; text-align: center; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: rgba(255,255,255,0.8); font-size: 0.9rem; font-weight: 500; margin-bottom: 8px; font-family: 'Inter', sans-serif; }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            color: white;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }
        .form-group input:focus { border-color: #7c3aed; background: rgba(124,58,237,0.1); box-shadow: 0 0 0 3px rgba(124,58,237,0.2); }
        .form-group input::placeholder { color: rgba(255,255,255,0.3); }
        .btn-primary {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #7c3aed, #06b6d4);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(124,58,237,0.4); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .back-link { text-align: center; margin-top: 24px; color: rgba(255,255,255,0.6); font-size: 0.9rem; }
        .back-link a { color: #7c3aed; text-decoration: none; font-weight: 600; }
        .back-link a:hover { color: #06b6d4; }
        .otp-step { display: none; }
        .step-icon { text-align: center; font-size: 3rem; margin-bottom: 16px; }
    </style>
</head>
<body>

<div class="forgot-card">
    <div class="logo-area">
        <a href="index.html"><h1>🛍️ GlowMart</h1></a>
        <p>Premium Fashion & Lifestyle Store</p>
    </div>

    <!-- Step 1: Enter Email -->
    <div id="step1">
        <h2 class="card-title">Forgot Password?</h2>
        <p class="card-subtitle">Enter your registered email and we'll send you an OTP to reset your password.</p>
        <form id="emailForm">
            <div class="form-group">
                <label>📧 Email Address</label>
                <input type="email" id="emailInput" placeholder="Enter your email" required>
            </div>
            <button type="submit" class="btn-primary" id="sendOtpBtn">Send OTP to Email</button>
        </form>
    </div>

    <!-- Step 2: Enter OTP + New Password -->
    <div id="step2" class="otp-step">
        <div class="step-icon">📬</div>
        <h2 class="card-title">Check Your Email</h2>
        <p class="card-subtitle" id="otpSentMsg">We've sent a 6-digit OTP to your email. Enter it below.</p>
        <form id="resetForm">
            <div class="form-group">
                <label>🔑 Enter OTP</label>
                <input type="text" id="otpInput" placeholder="Enter 6-digit OTP" maxlength="6" required>
            </div>
            <div class="form-group">
                <label>🔒 New Password</label>
                <input type="password" id="newPassword" placeholder="Enter new password" required>
            </div>
            <div class="form-group">
                <label>🔒 Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
            </div>
            <button type="submit" class="btn-primary" id="resetBtn">Reset Password</button>
        </form>
    </div>

    <div class="back-link">
        <a href="login.html">← Back to Login</a>
    </div>
</div>

<script src="js/api.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    let userEmail = '';

    document.getElementById('emailForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        userEmail = document.getElementById('emailInput').value;
        const btn = document.getElementById('sendOtpBtn');
        btn.disabled = true;
        btn.textContent = '⏳ Sending OTP...';

        try {
            const res = await api.forgotPassword(userEmail);
            if (res.message) {
                document.getElementById('step1').style.display = 'none';
                document.getElementById('step2').style.display = 'block';
                document.getElementById('otpSentMsg').textContent = `We've sent a 6-digit OTP to ${userEmail}. Enter it below.`;
                Swal.fire({ icon: 'success', title: '📬 OTP Sent!', text: `Check your email: ${userEmail}`, background: '#1a1a2e', color: '#fff', confirmButtonColor: '#7c3aed' });
            } else {
                Swal.fire({ icon: 'error', title: 'Error', text: res.error || 'Email not found. Please register first.', background: '#1a1a2e', color: '#fff', confirmButtonColor: '#7c3aed' });
                btn.disabled = false;
                btn.textContent = 'Send OTP to Email';
            }
        } catch(err) {
            Swal.fire({ icon: 'error', title: 'Error', text: 'Server error. Please try again.', background: '#1a1a2e', color: '#fff', confirmButtonColor: '#7c3aed' });
            btn.disabled = false;
            btn.textContent = 'Send OTP to Email';
        }
    });

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const otp = document.getElementById('otpInput').value;
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;

        if (newPassword !== confirmPassword) {
            Swal.fire({ icon: 'error', title: 'Mismatch', text: 'Passwords do not match!', background: '#1a1a2e', color: '#fff', confirmButtonColor: '#7c3aed' });
            return;
        }

        if (newPassword.length < 6) {
            Swal.fire({ icon: 'error', title: 'Too Short', text: 'Password must be at least 6 characters.', background: '#1a1a2e', color: '#fff', confirmButtonColor: '#7c3aed' });
            return;
        }

        const btn = document.getElementById('resetBtn');
        btn.disabled = true;
        btn.textContent = '⏳ Resetting...';

        try {
            const res = await fetch('/api/auth/reset-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: userEmail, otp, newPassword })
            });
            const data = await res.json();
            if (data.message) {
                Swal.fire({ icon: 'success', title: '✅ Password Reset!', text: 'Your password has been changed. Please login.', background: '#1a1a2e', color: '#fff', confirmButtonColor: '#7c3aed' }).then(() => {
                    window.location.href = 'login.html';
                });
            } else {
                Swal.fire({ icon: 'error', title: 'Error', text: data.error || 'Invalid or expired OTP.', background: '#1a1a2e', color: '#fff', confirmButtonColor: '#7c3aed' });
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        } catch(err) {
            Swal.fire({ icon: 'error', title: 'Error', text: 'Server error. Please try again.', background: '#1a1a2e', color: '#fff', confirmButtonColor: '#7c3aed' });
            btn.disabled = false;
            btn.textContent = 'Reset Password';
        }
    });
</script>
</body>
</html>
