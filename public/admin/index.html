<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - GlowMart</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .admin-layout { display: flex; min-height: 100vh; background: #f8f9fa; }
        .admin-sidebar { width: 250px; background: white; padding: 2rem; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .admin-sidebar h2 { color: #ff3e6c; margin-bottom: 2rem; }
        .admin-nav { display: flex; flex-direction: column; gap: 1rem; }
        .admin-nav a { padding: 0.8rem; border-radius: 8px; color: #333; text-decoration: none; font-weight: 500; transition: 0.2s; }
        .admin-nav a:hover, .admin-nav a.active { background: #ff3e6c; color: white; }
        .admin-main { flex: 1; padding: 2rem; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem; }
        .stat-card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .stat-card h3 { color: #666; font-size: 1rem; margin-bottom: 0.5rem; }
        .stat-card .value { font-size: 2rem; font-weight: bold; color: #333; }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <h2>GlowMart Admin</h2>
            <nav class="admin-nav">
                <a href="index.html" class="active">Dashboard</a>
                <a href="products.html">Products</a>
                <a href="categories.html">Categories</a>
                <a href="orders.html">Orders</a>
                <a href="users.html">Users</a>
                <a href="../index.html" style="margin-top: 2rem; background: #eee;">← Back to Store</a>
            </nav>
        </aside>
        
        <main class="admin-main">
            <h1 style="margin-bottom: 2rem;">Dashboard Overview</h1>
            <div class="stats-grid" id="stats-grid">
                <div class="stat-card"><h3>Loading...</h3><div class="value">-</div></div>
            </div>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = api.getUser();
            if (!user || user.role !== 'admin') {
                alert('Unauthorized Access');
                window.location.href = '../index.html';
                return;
            }

            try {
                const stats = await api.getAdminStats();
                document.getElementById('stats-grid').innerHTML = `
                    <div class="stat-card">
                        <h3>Total Revenue</h3>
                        <div class="value" style="color: #ff3e6c;">₹${(stats.revenue || 0).toLocaleString()}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Orders</h3>
                        <div class="value">${stats.orders}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Products</h3>
                        <div class="value">${stats.products}</div>
                    </div>
                    <div class="stat-card">
                        <h3>Total Users</h3>
                        <div class="value">${stats.users}</div>
                    </div>
                `;
            } catch (err) {
                console.error(err);
            }
        });
    </script>
</body>
</html>
