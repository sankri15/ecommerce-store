<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .admin-layout { display: flex; min-height: 100vh; background: #f8f9fa; }
        .admin-sidebar { width: 250px; background: white; padding: 2rem; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .admin-sidebar h2 { color: #ff3e6c; margin-bottom: 2rem; }
        .admin-nav { display: flex; flex-direction: column; gap: 1rem; }
        .admin-nav a { padding: 0.8rem; border-radius: 8px; color: #333; text-decoration: none; font-weight: 500; transition: 0.2s; }
        .admin-nav a:hover, .admin-nav a.active { background: #ff3e6c; color: white; }
        .admin-main { flex: 1; padding: 2rem; }
        
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input { width: 100%; padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 8px; }
        .btn { padding: 0.8rem 1.5rem; background: #ff3e6c; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; background: white; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; }
        .role-badge { padding: 0.3rem 0.6rem; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .role-admin { background: #ff3e6c; color: white; }
        .role-user { background: #e2e8f0; color: #333; }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <h2>GlowMart Admin</h2>
            <nav class="admin-nav">
                <a href="index.html">Dashboard</a>
                <a href="products.html">Products</a>
                <a href="categories.html">Categories</a>
                <a href="orders.html">Orders</a>
                <a href="users.html" class="active">Users</a>
                <a href="../index.html" style="margin-top: 2rem; background: #eee;">← Back to Store</a>
            </nav>
        </aside>
        
        <main class="admin-main">
            <h1 style="margin-bottom: 2rem;">Manage Users</h1>
            
            <div class="card">
                <h3>Add New Admin</h3>
                <form id="addAdminForm" style="margin-top: 1.5rem; display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 1rem; align-items: end;">
                    <div class="form-group"><label>Name</label><input type="text" id="name" required></div>
                    <div class="form-group"><label>Email</label><input type="email" id="email" required></div>
                    <div class="form-group"><label>Password</label><input type="password" id="password" required></div>
                    <div><button type="submit" class="btn" id="submitBtn">Add Admin</button></div>
                </form>
            </div>

            <div class="card">
                <h3>Current Users</h3>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Joined</th>
                            </tr>
                        </thead>
                        <tbody id="usersTableBody">
                            <tr><td colspan="5">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            if (!api.getUser() || api.getUser().role !== 'admin') return window.location.href = '../index.html';
            loadUsers();
        });

        async function loadUsers() {
            try {
                const users = await api.getAdminUsers();
                document.getElementById('usersTableBody').innerHTML = users.map(u => `
                    <tr>
                        <td>${u.id}</td>
                        <td>${u.name}</td>
                        <td>${u.email}</td>
                        <td><span class="role-badge role-${u.role}">${u.role.toUpperCase()}</span></td>
                        <td>${u.created_at ? new Date(u.created_at).toLocaleDateString() : 'N/A'}</td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        document.getElementById('addAdminForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;

            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('/api/admin/add-admin', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                
                if (data.id) {
                    Swal.fire('Success', 'Admin added!', 'success');
                    e.target.reset();
                    loadUsers();
                } else {
                    Swal.fire('Error', data.error || 'Failed', 'error');
                }
            } catch (err) {
                Swal.fire('Error', 'Server error', 'error');
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
