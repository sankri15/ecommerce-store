<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products - Admin</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .admin-layout { display: flex; min-height: 100vh; background: #f8f9fa; }
        .admin-sidebar { width: 250px; background: white; padding: 2rem; box-shadow: 2px 0 10px rgba(0,0,0,0.05); }
        .admin-sidebar h2 { color: #ff3e6c; margin-bottom: 2rem; }
        .admin-nav { display: flex; flex-direction: column; gap: 1rem; }
        .admin-nav a { padding: 0.8rem; border-radius: 8px; color: #333; text-decoration: none; font-weight: 500; transition: 0.2s; }
        .admin-nav a:hover, .admin-nav a.active { background: #ff3e6c; color: white; }
        .admin-main { flex: 1; padding: 2rem; }
        
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 8px; }
        .btn { padding: 0.8rem 1.5rem; background: #ff3e6c; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; background: white; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; font-weight: 600; }
        img { width: 50px; height: 50px; object-fit: cover; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="admin-layout">
        <aside class="admin-sidebar">
            <h2>GlowMart Admin</h2>
            <nav class="admin-nav">
                <a href="index.html">Dashboard</a>
                <a href="products.html" class="active">Products</a>
                <a href="categories.html">Categories</a>
                <a href="orders.html">Orders</a>
                <a href="users.html">Users</a>
                <a href="../index.html" style="margin-top: 2rem; background: #eee;">← Back to Store</a>
            </nav>
        </aside>
        
        <main class="admin-main">
            <h1 style="margin-bottom: 2rem;">Manage Products</h1>
            
            <div class="card">
                <h3>Add New Product</h3>
                <form id="addProductForm" style="margin-top: 1.5rem; display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group"><label>Product Name</label><input type="text" id="name" required></div>
                    <div class="form-group"><label>Brand</label><input type="text" id="brand" required></div>
                    <div class="form-group"><label>Price (₹)</label><input type="number" id="price" required></div>
                    <div class="form-group"><label>Category</label><input type="text" id="category" placeholder="e.g. Men, Women" required></div>
                    <div class="form-group" style="grid-column: 1 / -1;"><label>Main Image URL</label><input type="url" id="image" required></div>
                    <div class="form-group" style="grid-column: 1 / -1;"><label>Additional Images (Comma separated URLs)</label><input type="text" id="additional_images" placeholder="https://url1, https://url2"></div>
                    <div class="form-group" style="grid-column: 1 / -1;"><label>Description</label><textarea id="desc" rows="3" required></textarea></div>
                    <div style="grid-column: 1 / -1;"><button type="submit" class="btn" id="submitBtn">Add Product</button></div>
                </form>
            </div>

            <div class="card">
                <h3>Current Products</h3>
                <div style="overflow-x: auto;">
                    <table>
                        <thead>
                            <tr>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Brand</th>
                                <th>Category</th>
                                <th>Price</th>
                            </tr>
                        </thead>
                        <tbody id="productsTableBody">
                            <tr><td colspan="5">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="../js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const user = api.getUser();
            if (!user || user.role !== 'admin') {
                window.location.href = '../index.html';
                return;
            }
            loadProducts();
        });

        async function loadProducts() {
            try {
                const products = await api.getProducts();
                const tbody = document.getElementById('productsTableBody');
                tbody.innerHTML = products.map(p => `
                    <tr>
                        <td><img src="${p.image}" alt="${p.name}"></td>
                        <td>${p.name}</td>
                        <td>${p.brand}</td>
                        <td>${p.category}</td>
                        <td>₹${p.price}</td>
                    </tr>
                `).join('');
            } catch (err) {
                console.error(err);
            }
        }

        document.getElementById('addProductForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            
            let addImgs = [];
            const addImgsStr = document.getElementById('additional_images').value;
            if (addImgsStr.trim()) {
                addImgs = addImgsStr.split(',').map(s => s.trim()).filter(s => s);
            }

            const data = {
                name: document.getElementById('name').value,
                brand: document.getElementById('brand').value,
                price: parseFloat(document.getElementById('price').value),
                category: document.getElementById('category').value,
                image: document.getElementById('image').value,
                additional_images: JSON.stringify(addImgs),
                description: document.getElementById('desc').value,
            };

            try {
                const res = await api.addAdminProduct(data);
                if (res.id) {
                    Swal.fire('Success', 'Product added!', 'success');
                    e.target.reset();
                    loadProducts();
                } else {
                    Swal.fire('Error', res.error, 'error');
                }
            } catch (err) {
                Swal.fire('Error', 'Failed to add product', 'error');
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
