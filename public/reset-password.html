<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - GlowMart</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container { max-width: 400px; margin: 4rem auto; background: rgba(255, 255, 255, 0.9); padding: 2rem; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
        .form-group input { width: 100%; padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 8px; font-family: inherit; }
        .btn { width: 100%; padding: 1rem; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; background: #ff3e6c; color: white; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo"><a href="index.html"><h1>GlowMart</h1></a></div>
    </header>

    <main class="auth-container">
        <h2 style="text-align: center; margin-bottom: 2rem;">Reset Password</h2>
        <form id="resetForm">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" readonly style="background: #f8f9fa;">
            </div>
            <div class="form-group">
                <label>OTP (6-digits from email)</label>
                <input type="text" id="otp" required>
            </div>
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="password" required>
            </div>
            <button type="submit" class="btn" id="submitBtn">Reset Password</button>
        </form>
    </main>

    <script src="js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const email = params.get('email');
            if (email) {
                document.getElementById('email').value = email;
            } else {
                window.location.href = 'forgot-password.html';
            }
        });

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const otp = document.getElementById('otp').value;
            const password = document.getElementById('password').value;
            
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;

            try {
                const res = await api.resetPassword(email, otp, password);
                if (res.message) {
                    Swal.fire('Success', 'Password reset successful! Please login.', 'success').then(() => {
                        window.location.href = 'login.html';
                    });
                } else {
                    Swal.fire('Error', res.error, 'error');
                }
            } catch(err) {
                Swal.fire('Error', 'Server error', 'error');
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
