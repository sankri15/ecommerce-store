<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign in to GlowMart" />
  <title>Login &#8211; GlowMart</title>
  <link rel="stylesheet" href="/css/style.css" />
  <style>
    /* =========================================================
       AUTH PAGE — GlowMart Premium Login
       Dark glassmorphism + animated orbs background
    ========================================================= */

    /* ── Page Layout ── */
    .auth-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: var(--bg-dark, #0a0a0f);
      padding: 2rem 1rem;
    }

    /* ── Animated Background Orbs ── */
    .hero-bg-orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .hero-bg-orbs .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      animation: orbFloat 12s ease-in-out infinite alternate;
    }

    .hero-bg-orbs .orb:nth-child(1) {
      width: 480px;
      height: 480px;
      background: radial-gradient(circle, #a855f7, #6d28d9);
      top: -120px;
      left: -100px;
      animation-duration: 14s;
    }

    .hero-bg-orbs .orb:nth-child(2) {
      width: 360px;
      height: 360px;
      background: radial-gradient(circle, #ec4899, #be185d);
      bottom: -80px;
      right: -80px;
      animation-duration: 10s;
      animation-delay: -4s;
    }

    .hero-bg-orbs .orb:nth-child(3) {
      width: 280px;
      height: 280px;
      background: radial-gradient(circle, #3b82f6, #1d4ed8);
      top: 50%;
      left: 60%;
      animation-duration: 16s;
      animation-delay: -8s;
      animation-name: orbFloatAlt;
    }

    @keyframes orbFloat {
      0%   { transform: translate(0px, 0px) scale(1); }
      33%  { transform: translate(30px, -40px) scale(1.05); }
      66%  { transform: translate(-20px, 20px) scale(0.97); }
      100% { transform: translate(15px, -15px) scale(1.03); }
    }

    @keyframes orbFloatAlt {
      0%   { transform: translate(-50%, -50%) scale(1); }
      50%  { transform: translate(calc(-50% + 40px), calc(-50% - 30px)) scale(1.08); }
      100% { transform: translate(calc(-50% - 20px), calc(-50% + 20px)) scale(0.95); }
    }

    /* ── Auth Card ── */
    .auth-card {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.10);
      border-radius: 24px;
      padding: 2.75rem 2.5rem 2.25rem;
      box-shadow:
        0 8px 40px rgba(0, 0, 0, 0.55),
        0 0 0 1px rgba(168, 85, 247, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      animation: cardFadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes cardFadeIn {
      from {
        opacity: 0;
        transform: translateY(32px) scale(0.97);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* ── Logo ── */
    .auth-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.75rem;
    }

    .auth-logo .logo-emoji {
      font-size: 2.4rem;
      line-height: 1;
      filter: drop-shadow(0 0 12px rgba(168, 85, 247, 0.6));
      animation: emojiBounce 3s ease-in-out infinite;
      display: inline-block;
    }

    @keyframes emojiBounce {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-5px); }
    }

    .auth-logo a {
      text-decoration: none;
    }

    .logo-text {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #a855f7 0%, #ec4899 50%, #f97316 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
      transition: filter 0.3s ease;
      display: inline-block;
    }

    .logo-text:hover {
      filter: brightness(1.2);
    }

    /* ── Headings ── */
    .auth-title {
      font-size: 1.65rem;
      font-weight: 700;
      color: #f1f5f9;
      text-align: center;
      margin: 0 0 0.4rem;
      letter-spacing: -0.3px;
    }

    .auth-sub {
      font-size: 0.92rem;
      color: rgba(203, 213, 225, 0.65);
      text-align: center;
      margin: 0 0 2rem;
    }

    /* ── Form ── */
    #loginForm {
      display: flex;
      flex-direction: column;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      margin-bottom: 1.2rem;
    }

    .form-group label {
      font-size: 0.82rem;
      font-weight: 600;
      color: rgba(203, 213, 225, 0.8);
      letter-spacing: 0.4px;
      text-transform: uppercase;
    }

    .form-input {
      width: 100%;
      padding: 0.78rem 1rem;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.10);
      background: rgba(255, 255, 255, 0.06);
      color: #f1f5f9;
      font-size: 0.96rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.25s ease, background 0.25s ease, box-shadow 0.25s ease;
      box-sizing: border-box;
      -webkit-appearance: none;
      appearance: none;
    }

    .form-input::placeholder {
      color: rgba(148, 163, 184, 0.45);
    }

    .form-input:focus {
      border-color: rgba(168, 85, 247, 0.65);
      background: rgba(168, 85, 247, 0.07);
      box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.18);
    }

    .form-input:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 100px #1a1025 inset;
      -webkit-text-fill-color: #f1f5f9;
      border-color: rgba(168, 85, 247, 0.4);
    }

    /* ── Remember Me / Forgot Password row ── */
    .auth-meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .auth-remember {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      cursor: pointer;
      user-select: none;
    }

    .auth-remember input[type="checkbox"] {
      width: 15px;
      height: 15px;
      accent-color: #a855f7;
      cursor: pointer;
      flex-shrink: 0;
    }

    .auth-remember span {
      font-size: 0.82rem;
      color: rgba(148, 163, 184, 0.75);
    }

    .auth-forgot {
      font-size: 0.82rem;
      color: var(--primary-light, #c084fc);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .auth-forgot:hover {
      color: #e879f9;
      text-decoration: underline;
    }

    /* ── Submit Button ── */
    .btn-primary {
      display: block;
      width: 100%;
      padding: 0.9rem 1.5rem;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      font-family: inherit;
      cursor: pointer;
      background: linear-gradient(135deg, #9333ea 0%, #db2777 55%, #f97316 100%);
      background-size: 200% 200%;
      color: #fff;
      box-shadow:
        0 4px 20px rgba(147, 51, 234, 0.45),
        0 2px 8px rgba(0, 0, 0, 0.25);
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        opacity 0.2s ease;
      animation: gradientShift 5s ease infinite;
      margin-bottom: 1.5rem;
    }

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow:
        0 8px 30px rgba(147, 51, 234, 0.55),
        0 4px 12px rgba(0, 0, 0, 0.3);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0px);
      box-shadow: 0 2px 10px rgba(147, 51, 234, 0.35);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* ── Create Account link ── */
    .auth-link {
      text-align: center;
      font-size: 0.88rem;
      color: rgba(148, 163, 184, 0.7);
      margin-bottom: 1.5rem;
    }

    .auth-link a {
      color: #c084fc;
      font-weight: 600;
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .auth-link a:hover {
      color: #e879f9;
      text-decoration: underline;
    }

    /* ── Divider ── */
    .auth-divider {
      border: none;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      margin: 0 0 1.25rem;
    }

    /* ── Social Proof ── */
    .auth-social-proof {
      text-align: center;
      font-size: 0.76rem;
      color: rgba(100, 116, 139, 0.85);
      letter-spacing: 0.3px;
      line-height: 1.6;
      margin: 0;
    }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .auth-card {
        padding: 2rem 1.5rem 1.75rem;
        border-radius: 20px;
      }
      .auth-title {
        font-size: 1.4rem;
      }
      .logo-text {
        font-size: 1.7rem;
      }
      .hero-bg-orbs .orb:nth-child(1) {
        width: 280px;
        height: 280px;
      }
      .hero-bg-orbs .orb:nth-child(2) {
        width: 220px;
        height: 220px;
      }
      .hero-bg-orbs .orb:nth-child(3) {
        width: 180px;
        height: 180px;
      }
    }
  </style>
</head>
<body class="auth-page">

  <!-- ── Animated Background Orbs ── -->
  <div class="hero-bg-orbs" aria-hidden="true">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>

  <!-- ── Auth Card ── -->
  <div class="auth-card">

    <!-- Logo -->
    <div class="auth-logo">
      <span class="logo-emoji">&#x1F6CD;&#xFE0F;</span>
      <a href="index.html"><span class="logo-text">GlowMart</span></a>
    </div>

    <!-- Titles -->
    <h1 class="auth-title">Welcome Back</h1>
    <p class="auth-sub">Sign in to your GlowMart account</p>

    <!-- Login Form -->
    <form id="loginForm" novalidate>

      <!-- Email -->
      <div class="form-group">
        <label for="email">Email Address</label>
        <input
          type="email"
          id="email"
          class="form-input"
          placeholder="you@example.com"
          autocomplete="email"
          required
        />
      </div>

      <!-- Password -->
      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          class="form-input"
          placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;"
          autocomplete="current-password"
          required
        />
      </div>

      <!-- Remember Me / Forgot Password -->
      <div class="auth-meta-row" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
        <label class="auth-remember">
          <input type="checkbox" id="rememberMe" />
          <span>Remember me</span>
        </label>
        <a href="forgot-password.html" class="auth-forgot" style="color:var(--primary-light, #c084fc);">Forgot password?</a>
      </div>

      <!-- Submit -->
      <button type="submit" class="btn-primary" id="loginBtn">&#x1F510; Sign In</button>

    </form>

    <!-- Create Account -->
    <p class="auth-link">New to GlowMart? <a href="register.html">Create Account</a></p>

    <!-- Divider -->
    <hr class="auth-divider" />

    <!-- Social Proof -->
    <p class="auth-social-proof">
      &#x1F512;&nbsp;Secure Login &nbsp;&bull;&nbsp; &#x1F6CD;&nbsp;GlowMart &nbsp;&bull;&nbsp; 2M+ Happy Customers
    </p>

  </div><!-- /.auth-card -->

  <!-- Scripts -->
  <script src="/js/api.js"></script>
  <script src="/js/app.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      btn.textContent = 'Signing in...';
      btn.disabled = true;
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      try {
        const res = await api.login(email, password);
        if (res.token) {
          window.location.href = 'index.html';
        } else {
          alert(res.error || 'Login failed');
          btn.textContent = '\uD83D\uDD10 Sign In';
          btn.disabled = false;
        }
      } catch(e) {
        alert('Login failed. Check your credentials.');
        btn.textContent = '\uD83D\uDD10 Sign In';
        btn.disabled = false;
      }
    });
  </script>

</body>
</html>
